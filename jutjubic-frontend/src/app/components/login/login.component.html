<div class="login-container">
  <div class="login-card">
    <h1>Prijava</h1>
    <p class="subtitle">Dobrodošli nazad na Jutjubić</p>

    @if (errorMessage) {
      <div class="alert alert-error">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        {{ errorMessage }}
      </div>
    }

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email adresa <span class="required">*</span></label>
        <input
          type="email"
          id="email"
          formControlName="email"
          [class.error]="hasFieldError('email')"
          placeholder="primer@example.com"
          autocomplete="email"
        />
        @if (hasFieldError('email')) {
          <span class="error-message">{{ getFieldError('email') }}</span>
        }
      </div>

      <div class="form-group">
        <label for="password">Lozinka <span class="required">*</span></label>
        <input
          type="password"
          id="password"
          formControlName="password"
          [class.error]="hasFieldError('password')"
          placeholder="Unesite lozinku"
          autocomplete="current-password"
        />
        @if (hasFieldError('password')) {
          <span class="error-message">{{ getFieldError('password') }}</span>
        }
      </div>

      <button type="submit" class="btn-primary" [disabled]="isSubmitting">
        @if (isSubmitting) {
          <span class="spinner"></span>
          Prijava u toku...
        } @else {
          Prijavite se
        }
      </button>
    </form>

    <div class="register-link">
      <p>Nemate nalog? <a routerLink="/register">Registrujte se</a></p>
    </div>
  </div>
</div>
